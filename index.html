<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminario Nacional de Aikido 2026 - Margarita</title>
    <style>
        :root {
            --azul-profundo: #1a3a5a;
            --verde-agua: #4db6ac;
            --bronce: #cd7f32;
            --blanco-hueso: #f4f4f4;
            --oro-patrocinio: #f6ad55;
        }

        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--blanco-hueso); color: #333; 
        }
        
        .hero {
            background: linear-gradient(rgba(26, 58, 90, 0.85), rgba(26, 58, 90, 0.85)), 
                        url('https://images.unsplash.com/photo-1555597673-b21d5c935865?auto=format&fit=crop&q=80'); 
            background-size: cover; background-position: center;
            min-height: 65vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            color: white; padding: 40px 20px;
        }

        .foto-sensei { 
            width: 200px; height: 200px; margin-bottom: 20px; 
            border-radius: 50%; border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            object-fit: cover;
        }

        h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { font-size: 1.2rem; color: var(--verde-agua); margin-bottom: 25px; font-weight: bold; }

        .btn-registro {
            background-color: var(--verde-agua); color: var(--azul-profundo); 
            padding: 18px 40px; border: none; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; 
            text-decoration: none; transition: 0.3s; display: inline-block;
        }
        .btn-registro:hover { background-color: white; transform: scale(1.05); }

        .container { max-width: 900px; margin: -40px auto 60px; padding: 0 20px; }
        
        .day-card { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; 
        }

        h2 { color: var(--azul-profundo); border-left: 5px solid var(--bronce); padding-left: 15px; margin-top: 0; }
        h3 { color: var(--bronce); font-size: 1rem; margin-top: -10px; margin-bottom: 20px; text-transform: uppercase; }
        
        .schedule-item { 
            display: flex; padding: 12px 0; border-bottom: 1px solid #eee; align-items: baseline;
        }
        .time { font-weight: bold; color: var(--azul-profundo); min-width: 120px; font-size: 0.95rem; }
        .activity { flex-grow: 1; line-height: 1.4; }

        .nav-buttons {
            display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 40px; padding-bottom: 20px;
        }

        .btn-secondary {
            background-color: transparent; padding: 12px 25px; border-radius: 50px; 
            text-decoration: none; font-size: 0.9rem; font-weight: bold; 
            transition: 0.3s; display: inline-block; width: 280px; text-align: center;
        }

        /* Botón de Patrocinio con color destacado */
        .btn-patrocinio {
            background-color: var(--oro-patrocinio);
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(246, 173, 85, 0.3);
        }
        .btn-patrocinio:hover {
            background-color: var(--bronce);
            transform: translateY(-2px);
        }

        .presentado-por {
            text-align: center; margin: 40px 0;
        }
        .presentado-por p { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
