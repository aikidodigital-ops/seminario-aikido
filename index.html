<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminario Nacional de Aikido 2026</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', sans-serif; height: 100%; color: white; background-color: #1a1a1a; }
        
        /* Fondo con imagen y superposición oscura */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1555597673-b21d5c935865?auto=format&fit=crop&q=80'); 
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        p { font-size: 1.2rem; margin-bottom: 30px; max-width: 600px; }

        /* Botón Interactivo */
        .btn-registro {
            background-color: #b22222; /* Rojo marcial */
            color: white; padding: 15px 40px; border: none; border-radius: 50px;
            font-size: 1.2rem; cursor: pointer; text-decoration: none;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-registro:hover { background-color: #ff0000; transform: scale(1.1); }

        /* Animación simple */
        .fade-in { animation: fadeIn 2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="hero">
        <div class="fade-in">
            <h1>Seminario Nacional de Aikido</h1>
            <p>Únete a nosotros en una experiencia de armonía, disciplina y técnica. Cupos limitados.</p>
            
            <a href="https://tu-enlace-de-google-form-aquí" class="btn-registro">Registrarme Ahora</a>
        </div>
    </div>

</body>
</html>
